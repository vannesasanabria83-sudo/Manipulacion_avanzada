<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CRUD - Actividad 10</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 md:p-12">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-4xl font-extrabold text-slate-800 mb-8 border-b-4 border-blue-500 inline-block">Gestión de Usuarios</h1>

        <div id="stats-panel" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-blue-600 text-white p-6 rounded-xl shadow-lg">
                <p class="text-sm uppercase font-bold opacity-80">Total Registros</p>
                <p id="total-count" class="text-3xl font-black">0</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm mb-8 flex gap-4 items-center">
            <input type="text" id="input-busqueda" placeholder="Buscar nombre exacto..." 
                   class="flex-1 p-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="ejecutarBusqueda()" 
                    class="bg-slate-800 text-white px-6 py-3 rounded-lg font-bold hover:bg-slate-700 transition">
                Buscar
            </button>
        </div>
        <p id="mensaje-busqueda" class="mb-6 text-blue-600 font-medium"></p>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-12">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-slate-200">
                    <tr>
                        <th class="p-4">ID</th>
                        <th class="p-4">Nombre Completo</th>
                        <th class="p-4">Edad</th>
                        <th class="p-4">Correo</th>
                    </tr>
                </thead>
                <tbody id="tabla-body" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>

        <h2 class="text-2xl font-bold text-slate-700 mb-6">Vista de Tarjetas</h2>
        <div id="cards-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        // Datos simulados (deben coincidir con el procesamiento de Node.js) [cite: 43]
        const usuarios = [
            { id: "1", nombre: "JUAN PEREZ", edad: 25, correo: "juan@mail.com" },
            { id: "3", nombre: "MARIA LUZ", edad: 28, correo: "maria@mail.com" }
        ];

        // RENDERIZADO DINÁMICO (Tabla y Cards) [cite: 23]
        function renderizarUI(lista) {
            // Tabla
            const tabla = document.getElementById('tabla-body');
            tabla.innerHTML = lista.map(u => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-4 font-mono text-sm">${u.id}</td>
                    <td class="p-4 font-bold text-slate-700">${u.nombre}</td>
                    <td class="p-4">${u.edad} años</td>
                    <td class="p-4 text-slate-500">${u.correo}</td>
                </tr>
            `).join('');

            // Cards
            const container = document.getElementById('cards-container');
            container.innerHTML = lista.map(u => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold mb-4">
                        ${u.nombre.charAt(0)}
                    </div>
                    <h3 class="text-lg font-bold text-slate-800">${u.nombre}</h3>
                    <p class="text-slate-500 text-sm mb-4">${u.correo}</p>
                    <div class="text-xs font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded-full inline-block">
                        ID: ${u.id} | ${u.edad} Años
                    </div>
                </div>
            `).join('');
        }

        // ESTADÍSTICAS CON .REDUCE() 
        const calcularEstadisticas = () => {
            const total = usuarios.reduce((acumulador) => acumulador + 1, 0);
            document.getElementById('total-count').innerText = total;
        };

        // BÚSQUEDA CON .FIND() 
        function ejecutarBusqueda() {
            const valor = document.getElementById('input-busqueda').value.toUpperCase();
            const encontrado = usuarios.find(u => u.nombre === valor); // Búsqueda exacta
            
            const mensaje = document.getElementById('mensaje-busqueda');
            if (encontrado) {
                mensaje.innerHTML = `✅ Encontrado: ${encontrado.nombre} (${encontrado.correo})`;
            } else {
                mensaje.innerHTML = "❌ No se encontró ningún usuario con ese nombre exacto.";
            }
        }

        // Inicializar la página
        renderizarUI(usuarios);
        calcularEstadisticas();
    </script>
</body>
</html>
